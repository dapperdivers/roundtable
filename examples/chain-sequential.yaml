apiVersion: ai.roundtable.io/v1alpha1
kind: Chain
metadata:
  name: security-report
  namespace: roundtable
spec:
  description: "Multi-step security report — scan, analyze, summarize"
  timeout: 3600
  input: "Generate a weekly security report for our Kubernetes cluster"

  steps:
    - name: threat_scan
      knightRef: galahad
      prompt: |
        Scan for recent CVEs affecting our stack:
        - Kubernetes, Flux, Cilium, Rook-Ceph
        - Check NIST NVD and GitHub Security Advisories
        Input: {{ .Input }}

    - name: infra_check
      knightRef: tristan
      prompt: |
        Check cluster health and recent changes:
        - Pod restarts, failed HelmReleases, pending PVCs
        - Any drift from GitOps state
        Context from security scan: {{ .Steps.threat_scan.Output }}

    - name: final_report
      knightRef: kay
      prompt: |
        Compile a concise weekly security report from:

        ## Threat Intelligence
        {{ .Steps.threat_scan.Output }}

        ## Infrastructure Status
        {{ .Steps.infra_check.Output }}

        Format as markdown with action items at the top.
