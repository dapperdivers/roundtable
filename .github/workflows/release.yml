name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate code
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1
          controller-gen object paths="./api/..."
          controller-gen crd rbac:roleName=manager-role webhook paths="./..." output:crd:artifacts:config=config/crd/bases

      - name: Run tests
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          KUBEBUILDER_ASSETS=$(setup-envtest use --print path) go test ./... -coverprofile cover.out

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:v${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - uses: azure/setup-helm@v4

      - name: Login to GHCR (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart version and publish
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/^version:.*/version: ${VERSION}/" charts/roundtable-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"v${VERSION}\"/" charts/roundtable-operator/Chart.yaml

          # Copy CRDs into chart
          for f in config/crd/bases/ai.roundtable.io_*.yaml; do
            cp "$f" charts/roundtable-operator/crds/
          done

          helm package charts/roundtable-operator
          helm push roundtable-operator-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Build release binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X main.version=v${{ steps.version.outputs.VERSION }}" -o bin/roundtable-operator-linux-amd64 cmd/main.go
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X main.version=v${{ steps.version.outputs.VERSION }}" -o bin/roundtable-operator-linux-arm64 cmd/main.go

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/roundtable-operator-linux-amd64
            bin/roundtable-operator-linux-arm64
