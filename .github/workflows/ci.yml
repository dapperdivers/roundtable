name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate DeepCopy
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1
          controller-gen object paths="./api/..."

      - name: Generate CRD Manifests
        run: |
          controller-gen crd rbac:roleName=manager-role webhook paths="./..." output:crd:artifacts:config=config/crd/bases

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/manager cmd/main.go

      - name: Setup envtest
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          ENVTEST_ASSETS=$(setup-envtest use --print path)
          echo "KUBEBUILDER_ASSETS=${ENVTEST_ASSETS}" >> $GITHUB_ENV

      - name: Test
        run: go test ./... -coverprofile cover.out

  docker:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate code
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1
          controller-gen object paths="./api/..."
          controller-gen crd rbac:roleName=manager-role webhook paths="./..." output:crd:artifacts:config=config/crd/bases

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/dapperdivers/roundtable:latest
            ghcr.io/dapperdivers/roundtable:${{ github.sha }}

  helm:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate CRD Manifests
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1
          controller-gen crd rbac:roleName=manager-role webhook paths="./..." output:crd:artifacts:config=config/crd/bases

      - name: Copy CRDs into chart
        run: |
          # Only copy actual CRD manifests, exclude kustomization.yaml
          for f in config/crd/bases/ai.roundtable.io_*.yaml; do
            cp "$f" charts/roundtable-operator/crds/
          done

      - name: Set chart version from SHA
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # Don't use pre-release tags — they cause semver ordering headaches with Flux
          # Chart version stays at base (e.g., 0.3.0), image tag identifies the build
          sed -i "s/^appVersion:.*/appVersion: \"${{ github.sha }}\"/" charts/roundtable-operator/Chart.yaml
          cat charts/roundtable-operator/Chart.yaml

      - uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push chart
        run: |
          helm package charts/roundtable-operator
          helm push roundtable-operator-*.tgz oci://ghcr.io/dapperdivers/charts
