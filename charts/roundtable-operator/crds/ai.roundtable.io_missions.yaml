                          properties:
                            image:
                              default: registry.k8s.io/git-sync/git-sync:v4.4.0
                              description: image overrides the git-sync container
                                image.
                              type: string
                            period:
                              default: 300s
                              description: period is how often to sync (e.g., "300s").
                              type: string
                            ref:
                              default: main
                              description: ref is the git ref to sync.
                              type: string
                            repo:
                              default: https://github.com/dapperdivers/roundtable-arsenal
                              description: repo is the git repository URL containing
                                skills.
                              type: string
                          type: object
                        capabilities:
                          description: capabilities configures optional runtime capabilities
                            for the knight pod.
                          properties:
                            browser:
                              description: |-
                                browser enables a headless Chrome sidecar with agent-browser CLI for web automation.
                                When true, the operator injects a browser sidecar and sets BROWSER_ENABLED=true.
                              type: boolean
                          type: object
                        concurrency:
                          default: 2
                          description: concurrency is the maximum number of concurrent
                            tasks the knight can process.
                          format: int32
                          maximum: 10
                          minimum: 1
                          type: integer
                        domain:
                          description: |-
                            domain is the knight's area of expertise (e.g., "security", "infrastructure", "finance").
                            Used for NATS subject routing and skill filtering.
                          minLength: 1
                          type: string
                        env:
                          description: env defines additional environment variables
                            for the knight container.
                          items:
                            description: EnvVar represents an environment variable
                              present in a Container.
                            properties:
                              name:
                                description: |-
                                  Name of the environment variable.
                                  May consist of any printable ASCII characters except '='.
                                type: string
                              value:
                                description: |-
                                  Variable references $(VAR_NAME) are expanded
                                  using the previously defined environment variables in the container and
                                  any service environment variables. If a variable cannot be resolved,
                                  the reference in the input string will be unchanged. Double $$ are reduced
                                  to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                                  "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                                  Escaped references will never be expanded, regardless of whether the variable
                                  exists or not.
                                  Defaults to "".
                                type: string
                              valueFrom:
                                description: Source for the environment variable's
                                  value. Cannot be used if value is not empty.
                                properties:
                                  configMapKeyRef:
                                    description: Selects a key of a ConfigMap.
                                    properties:
                                      key:
                                        description: The key to select.
                                        type: string
                                      name:
                                        default: ""
                                        description: |-
                                          Name of the referent.
                                          This field is effectively required, but due to backwards compatibility is
                                          allowed to be empty. Instances of this type with an empty value here are
                                          almost certainly wrong.
                                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                        type: string
                                      optional:
                                        description: Specify whether the ConfigMap
                                          or its key must be defined
                                        type: boolean
                                    required:
                                    - key
                                    type: object
                                    x-kubernetes-map-type: atomic
                                  fieldRef:
                                    description: |-
                                      Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                                      spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                                    properties:
                                      apiVersion:
                                        description: Version of the schema the FieldPath
                                          is written in terms of, defaults to "v1".
                                        type: string
                                      fieldPath:
                                        description: Path of the field to select in
                                          the specified API version.
                                        type: string
                                    required:
                                    - fieldPath
                                    type: object
                                    x-kubernetes-map-type: atomic
                                  fileKeyRef:
                                    description: |-
                                      FileKeyRef selects a key of the env file.
                                      Requires the EnvFiles feature gate to be enabled.
                                    properties:
                                      key:
                                        description: |-
                                          The key within the env file. An invalid key will prevent the pod from starting.
                                          The keys defined within a source may consist of any printable ASCII characters except '='.
                                          During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                                        type: string
                                      optional:
                                        default: false
                                        description: |-
                                          Specify whether the file or its key must be defined. If the file or key
                                          does not exist, then the env var is not published.
                                          If optional is set to true and the specified key does not exist,
                                          the environment variable will not be set in the Pod's containers.

                                          If optional is set to false and the specified key does not exist,
                                          an error will be returned during Pod creation.
                                        type: boolean
                                      path:
                                        description: |-
                                          The path within the volume from which to select the file.
                                          Must be relative and may not contain the '..' path or start with '..'.
                                        type: string
                                      volumeName:
                                        description: The name of the volume mount
                                          containing the env file.
                                        type: string
                                    required:
                                    - key
                                    - path
                                    - volumeName
                                    type: object
                                    x-kubernetes-map-type: atomic
                                  resourceFieldRef:
                                    description: |-
                                      Selects a resource of the container: only resources limits and requests
                                      (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                                    properties:
                                      containerName:
                                        description: 'Container name: required for
                                          volumes, optional for env vars'
                                        type: string
                                      divisor:
                                        anyOf:
                                        - type: integer
                                        - type: string
                                        description: Specifies the output format of
                                          the exposed resources, defaults to "1"
                                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                        x-kubernetes-int-or-string: true
                                      resource:
                                        description: 'Required: resource to select'
                                        type: string
                                    required:
                                    - resource
                                    type: object
                                    x-kubernetes-map-type: atomic
                                  secretKeyRef:
                                    description: Selects a key of a secret in the
                                      pod's namespace
                                    properties:
                                      key:
                                        description: The key of the secret to select
                                          from.  Must be a valid secret key.
                                        type: string
                                      name:
                                        default: ""
                                        description: |-
                                          Name of the referent.
                                          This field is effectively required, but due to backwards compatibility is
                                          allowed to be empty. Instances of this type with an empty value here are
                                          almost certainly wrong.
                                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                        type: string
                                      optional:
                                        description: Specify whether the Secret or
                                          its key must be defined
                                        type: boolean
                                    required:
                                    - key
                                    type: object
                                    x-kubernetes-map-type: atomic
                                type: object
                            required:
                            - name
                            type: object
                          type: array
                        envFrom:
                          description: envFrom defines sources of environment variables
                            (secrets, configmaps).
                          items:
                            description: EnvFromSource represents the source of a
                              set of ConfigMaps or Secrets
                            properties:
                              configMapRef:
                                description: The ConfigMap to select from
                                properties:
                                  name:
                                    default: ""
                                    description: |-
                                      Name of the referent.
                                      This field is effectively required, but due to backwards compatibility is
                                      allowed to be empty. Instances of this type with an empty value here are
                                      almost certainly wrong.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                  optional:
                                    description: Specify whether the ConfigMap must
                                      be defined
                                    type: boolean
                                type: object
                                x-kubernetes-map-type: atomic
                              prefix:
                                description: |-
                                  Optional text to prepend to the name of each environment variable.
                                  May consist of any printable ASCII characters except '='.
                                type: string
                              secretRef:
                                description: The Secret to select from
                                properties:
                                  name:
                                    default: ""
                                    description: |-
                                      Name of the referent.
                                      This field is effectively required, but due to backwards compatibility is
                                      allowed to be empty. Instances of this type with an empty value here are
                                      almost certainly wrong.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                  optional:
                                    description: Specify whether the Secret must be
                                      defined
                                    type: boolean
                                type: object
                                x-kubernetes-map-type: atomic
                            type: object
                          type: array
                        generatedSkills:
                          description: |-
                            generatedSkills contains inline skill definitions created by the planner.
                            Each skill is a markdown document mounted at /skills/<name>.md
                          items:
                            description: |-
                              GeneratedSkill is an inline skill definition created by the planner.
                              Each skill is a markdown document that gets mounted into the knight's /skills/ directory.
                            properties:
                              content:
                                description: content is the full markdown skill document.
                                type: string
                              name:
                                description: name is the skill filename (without .md
                                  extension).
                                type: string
                            required:
                            - content
                            - name
                            type: object
                          type: array
                        image:
                          description: |-
                            image is the container image for the knight runtime.
                            If empty, the operator uses DEFAULT_KNIGHT_IMAGE env var.
                          type: string
                        lifecycle:
                          description: lifecycle controls suspend/resume behavior.
                          properties:
                            idleTimeout:
                              description: |-
                                idleTimeout is how long after the last task before auto-suspending.
                                Only used when SuspendPolicy is "auto" (e.g., "30m", "1h").
                              type: string
                            suspendPolicy:
                              default: never
                              description: |-
                                suspendPolicy controls when the knight is suspended.
                                Values: auto, manual, never (default: never)
                              enum:
                              - auto
                              - manual
                              - never
                              type: string
                          type: object
                        model:
                          default: claude-sonnet-4-20250514
                          description: model is the AI model to use (e.g., "claude-sonnet-4-20250514",
                            "claude-haiku-35-20241022").
                          type: string
                        nats:
                          description: nats configures the knight's NATS JetStream
                            consumer and subjects.
                          properties:
                            consumerName:
                              description: |-
                                consumerName overrides the auto-generated durable consumer name.
                                Defaults to "knight-{name}".
                              type: string
                            maxDeliver:
                              default: 1
                              description: maxDeliver is the maximum number of delivery
                                attempts per message.
                              format: int32
                              minimum: 1
                              type: integer
                            resultsStream:
                              default: fleet_a_results
                              description: resultsStream is the JetStream stream to
                                publish results to.
                              type: string
                            stream:
                              default: fleet_a_tasks
                              description: stream is the JetStream stream name to
                                consume from.
                              type: string
                            subjects:
                              description: |-
                                subjects defines the JetStream filter subjects for task consumption.
                                e.g., ["fleet-a.tasks.security.>"]
                              items:
                                type: string
                              minItems: 1
                              type: array
                            url:
                              default: nats://nats.database.svc:4222
                              description: url is the NATS server URL.
                              type: string
                          required:
                          - subjects
                          type: object
                        nixPackages:
                          description: |-
                            nixPackages lists nix packages to install during knight bootstrap.
