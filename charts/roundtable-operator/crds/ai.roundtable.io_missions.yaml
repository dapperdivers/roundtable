---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: missions.ai.roundtable.io
spec:
  group: ai.roundtable.io
  names:
    kind: Mission
    listKind: MissionList
    plural: missions
    singular: mission
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.objective
      name: Objective
      priority: 1
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.knights
      name: Knights
      priority: 1
      type: integer
    - jsonPath: .spec.ttl
      name: TTL
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Mission is the Schema for the missions API.
          A Mission represents an ephemeral round table — a temporary group of knights
          assembled for a specific objective, with time-bounded execution and automatic cleanup.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Mission
            properties:
              briefing:
                description: |-
                  briefing is the initial context/instructions published to all mission knights
                  when the mission starts.
                type: string
              chains:
                description: chains lists chains to execute as part of this mission.
                items:
                  description: MissionChainRef references a chain to execute within
                    the mission.
                  properties:
                    inputOverride:
                      description: inputOverride provides mission-specific input data
                        that overrides the chain's default input.
                      type: string
                    name:
                      description: name is the Chain CR name to execute.
                      type: string
                    phase:
                      default: Active
                      description: phase controls when in the mission lifecycle this
                        chain runs.
                      enum:
                      - Setup
                      - Active
                      - Teardown
                      type: string
                  required:
                  - name
                  type: object
                type: array
              cleanupPolicy:
                default: Delete
                description: cleanupPolicy controls what happens to ephemeral resources
                  after mission completion.
                enum:
                - Delete
                - Retain
                type: string
              costBudgetUSD:
                default: "0"
                description: |-
                  costBudgetUSD is the maximum cost for this mission. When exceeded, the mission
                  is failed and cleanup begins. "0" means inherit from parent RoundTable.
                type: string
              generatedChains:
                description: |-
                  generatedChains stores chains created by the planner during Planning phase.
                  These chains are created as Chain CRs with owner references to the mission.
                items:
                  description: GeneratedChain represents a chain definition created
                    by the planner.
                  properties:
                    description:
                      description: description explains what this chain accomplishes.
                      type: string
                    input:
                      description: input is the initial data for the chain.
                      type: string
                    name:
                      description: name is the chain name (must be unique within the
                        mission).
                      type: string
                    phase:
                      default: Active
                      description: phase controls when this chain runs (Setup, Active,
                        Teardown).
                      enum:
                      - Setup
                      - Active
                      - Teardown
                      type: string
                    retryPolicy:
                      description: retryPolicy configures retry behavior.
                      properties:
                        backoffSeconds:
                          default: 30
                          description: backoffSeconds is the delay between retries
                            in seconds.
                          format: int32
                          type: integer
                        maxRetries:
                          default: 0
                          description: maxRetries is the maximum number of retries
                            per step.
                          format: int32
                          maximum: 5
                          minimum: 0
                          type: integer
                      type: object
                    steps:
                      description: steps are the chain steps.
                      items:
                        description: ChainStep defines a single step in the pipeline.
                        properties:
                          continueOnFailure:
                            default: false
                            description: continueOnFailure allows downstream steps
                              to proceed even if this step fails.
                            type: boolean
                          dependsOn:
                            description: |-
                              dependsOn lists step names that must complete successfully before this step runs.
                              If empty, the step runs immediately (or after the previous step in sequence).
                            items:
                              type: string
                            type: array
                          knightRef:
                            description: knightRef is the name of the Knight to execute
                              this step.
                            type: string
                          name:
                            description: name is a unique identifier for this step
                              within the chain.
                            minLength: 1
                            type: string
                          outputKey:
                            description: |-
                              outputKey is the key name under which this step's output is stored for downstream steps.
                              Defaults to the step name if not specified.
                            type: string
                          outputPath:
                            description: |-
                              outputPath is an optional file path where this step's output should be written.
                              Supports Go template variables: {{ .Date }} (YYYY-MM-DD), {{ .Chain }} (chain name), {{ .Step }} (step name).
                              When set, the controller dispatches a write task to the outputKnight after the step succeeds.
                            type: string
                          retry:
                            description: retry configures per-step retry behavior,
                              overriding the chain-level retryPolicy.
                            properties:
                              backoffSeconds:
                                default: 30
                                description: backoffSeconds is the delay between retries
                                  in seconds.
                                format: int32
                                minimum: 1
                                type: integer
                              maxAttempts:
                                default: 0
                                description: maxAttempts is the maximum number of
                                  retry attempts for this step.
                                format: int32
                                maximum: 10
                                minimum: 0
                                type: integer
                            type: object
                          task:
                            description: |-
                              task is the task prompt or instruction to send to the knight.
                              Supports Go template syntax with access to prior step outputs: {{ .Steps.step_name.Output }}
                            type: string
                          timeout:
                            default: 120
                            description: timeout is the per-step timeout in seconds.
                              Overrides the knight's default taskTimeout.
                            format: int32
                            maximum: 3600
                            minimum: 10
                            type: integer
                        required:
                        - knightRef
                        - name
                        - task
                        type: object
                      minItems: 1
                      type: array
                    timeout:
                      description: timeout overrides the default chain timeout.
                      format: int32
                      type: integer
                  required:
                  - name
                  - steps
                  type: object
                type: array
              generatedKnights:
                description: |-
                  generatedKnights stores ephemeral knight specs created by the planner.
                  These knights are added to the knights list during Planning phase.
                items:
                  description: MissionKnight references a knight participating in
                    a mission.
                  properties:
                    ephemeral:
                      default: false
                      description: |-
                        ephemeral, if true, creates a temporary Knight for this mission that is cleaned up on completion.
