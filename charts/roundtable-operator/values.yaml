# Default values for roundtable-operator
replicaCount: 1

image:
  repository: ghcr.io/dapperdivers/roundtable
  tag: latest
  pullPolicy: Always

serviceAccount:
  create: true
  name: roundtable-operator
  annotations: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Leader election for HA
leaderElect: true

# Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}

# Additional args to pass to the manager
extraArgs: []

# Global image settings for managed components — pinned to git SHAs of each
# repo's main; bump here (with a chart version bump), then update the chart
# version in dapper-cluster
images:
  piKnight:
    repository: ghcr.io/dapperdivers/pi-knight
    tag: f2ab01a9c2a5a0f215bf8c996f7c689aceee085c
  dashboard:
    repository: ghcr.io/dapperdivers/roundtable-ui
    tag: 630f8dfc80532139211896a67f3c9635aa0928b0

# Pod-level security context for all knight-owned pods — knight Deployments
# AND the shared Nix store build Jobs. Set once here; the operator applies it
# everywhere. OnRootMismatch is important: it stops kubelet from recursively
# chowning the (large) shared Nix store on every pod mount.
knightSecurity:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

# Pinned nixpkgs ref for knight tool flakes — an immutable commit for
# reproducible builds. Bump to roll the whole fleet's tooling forward (changing
# this triggers a one-time rebuild of every knight's Nix tools).
nixpkgs:
  ref: "9ae611a455b90cf061d8f332b977e387bda8e1ca" # nixos-unstable @ 2026-06-10

# Persistent shared-store builder (the nix-daemon builder). When enabled, a
# single-replica root Deployment owns the shared Nix store read-write, runs a
# nix-daemon, and builds knight tools that the operator dispatches through an
# RWX work-queue PVC — replacing the per-knight build Jobs + global store lock.
# The operator auto-switches to queue dispatch whenever the queue PVC is mounted
# into it (mountQueue, below); otherwise it falls back to the legacy build Jobs.
nixBuilder:
  enabled: false
  # Mount the work-queue PVC into the operator so it dispatches via the queue.
  # Keep in lockstep with enabled; split out only to stage a rollout if needed.
  mountQueue: true
  image:
    # Defaults to images.piKnight when repository/tag are empty.
    repository: ""
    tag: ""
    pullPolicy: Always
  storeClaimName: roundtable-nix-store        # RWX; mounted read-write (sole writer)
  queueClaimName: roundtable-nix-buildqueue   # RWX; operator<->builder coordination
  concurrency: 6                              # concurrent `nix build` clients
  scratchSizeLimit: 10Gi                      # emptyDir for build scratch (off the store)
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 4Gi

# Dashboard (Round Table UI) — observability platform
dashboard:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  ingress:
    enabled: false
    className: ""
    host: ""
    annotations: {}
  env:
    NATS_URL: "nats://nats.database.svc:4222"
    NAMESPACE: "roundtable"
    FLEET_PREFIX: "fleet-a"
    FLEET_STREAM: "fleet_a_results"
  vault:
    enabled: true
    claimName: "roundtable-vault"

# Knights to create alongside the operator
# Example:
# knights:
#   galahad:
#     domain: security
#     model: openrouter/deepseek/deepseek-v3.2
#     skills: [security, opencti, shared]
#     tools:
#       apt: [nmap, whois, dnsutils]
#     nats:
#       subjects: ["fleet-a.tasks.security.>"]
#     taskTimeout: 300
knights: {}

# Built-in planner knight — ships with the operator for meta-missions
planner:
  enabled: true
  domain: operator
  model: claude-sonnet-4-20250514
  skills:
    - operator
    - shared
  concurrency: 1
  taskTimeout: 600
  arsenal:
    repo: https://github.com/dapperdivers/roundtable-arsenal.git
    ref: main
    period: 5m
