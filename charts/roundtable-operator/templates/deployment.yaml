apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "roundtable-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "roundtable-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "roundtable-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "roundtable-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "roundtable-operator.serviceAccountName" . }}
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- if .Values.leaderElect }}
            - --leader-elect
            {{- end }}
            {{- range .Values.extraArgs }}
            - {{ . }}
            {{- end }}
          env:
            - name: DEFAULT_KNIGHT_IMAGE
              value: "{{ .Values.images.piKnight.repository }}:{{ .Values.images.piKnight.tag }}"
            # Pod security context applied to knight Deployments and Nix build
            # Jobs alike (set once here, reused by the operator).
            - name: KNIGHT_RUN_AS_USER
              value: "{{ .Values.knightSecurity.runAsUser }}"
            - name: KNIGHT_RUN_AS_GROUP
              value: "{{ .Values.knightSecurity.runAsGroup }}"
            - name: KNIGHT_FS_GROUP
              value: "{{ .Values.knightSecurity.fsGroup }}"
            - name: KNIGHT_FS_GROUP_CHANGE_POLICY
              value: "{{ .Values.knightSecurity.fsGroupChangePolicy }}"
            # Pinned nixpkgs ref for reproducible knight tool builds.
            - name: KNIGHT_NIXPKGS_REF
              value: "{{ .Values.nixpkgs.ref }}"
            {{- if .Values.notify.allowedURLPrefixes }}
            # SSRF allowlist for spec.notify completion webhooks; unset means
            # the operator rejects all notification URLs.
            - name: NOTIFY_ALLOWED_URL_PREFIXES
              value: "{{ join "," .Values.notify.allowedURLPrefixes }}"
            {{- end }}
            # Shared Nix store PVC — knights mount it read-only and the legacy
            # build Job mounts it read-write. Single source of truth for the
            # store name (the builder Deployment mounts the same value).
            - name: KNIGHT_NIX_STORE_PVC
              value: "{{ .Values.nixBuilder.storeClaimName }}"
            {{- if and .Values.nixBuilder.enabled .Values.nixBuilder.mountQueue }}
            # Presence of /queue switches the operator to queue-backed dispatch
            # (the nix-daemon builder) instead of per-knight build Jobs.
            - name: BUILD_QUEUE_DIR
              value: /queue
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          {{- if and .Values.nixBuilder.enabled .Values.nixBuilder.mountQueue }}
          volumeMounts:
            - name: build-queue
              mountPath: /queue
          {{- end }}
      {{- if and .Values.nixBuilder.enabled .Values.nixBuilder.mountQueue }}
      volumes:
        - name: build-queue
          persistentVolumeClaim:
            claimName: {{ .Values.nixBuilder.queueClaimName }}
      {{- end }}
